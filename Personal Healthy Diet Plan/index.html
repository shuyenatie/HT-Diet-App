<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HT健康饮食日记 - 下载安装</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1B5E20, #2E7D32, #4CAF50);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
    }
    .container {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .logo {
      width: 100px;
      height: 100px;
      border-radius: 24px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      margin: 0 auto 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .subtitle {
      font-size: 14px;
      opacity: 0.85;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 30px;
    }
    .feature {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(6px);
      border-radius: 14px;
      padding: 16px 12px;
      text-align: center;
    }
    .feature-icon { font-size: 28px; margin-bottom: 6px; display: block; }
    .feature-name { font-size: 13px; font-weight: 600; }
    .feature-desc { font-size: 11px; opacity: 0.75; margin-top: 3px; }
    .install-btn {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: none;
      background: #fff;
      color: #2E7D32;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      margin-bottom: 16px;
      transition: transform 0.2s;
    }
    .install-btn:active { transform: scale(0.97); }
    .install-btn-secondary {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.5);
      background: transparent;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 24px;
      transition: all 0.2s;
    }
    .install-btn-secondary:active { background: rgba(255,255,255,0.1); }
    .guide {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(6px);
      border-radius: 16px;
      padding: 20px;
      text-align: left;
      margin-bottom: 20px;
    }
    .guide-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
    .guide-step {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 13px;
      line-height: 1.6;
    }
    .guide-step:last-child { margin-bottom: 0; }
    .step-num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .ios-guide { display: none; }
    .footer {
      font-size: 11px;
      opacity: 0.6;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🥗</div>
    <h1>HT健康饮食日记</h1>
    <p class="subtitle">智能饮食记录 · 碳循环计划 · 营养精准计算<br>你的私人饮食管理助手</p>

    <div class="features">
      <div class="feature"><span class="feature-icon">📝</span><span class="feature-name">饮食记录</span><span class="feature-desc">240+食物数据库</span></div>
      <div class="feature"><span class="feature-icon">🔥</span><span class="feature-name">碳循环</span><span class="feature-desc">高低碳日智能切换</span></div>
      <div class="feature"><span class="feature-icon">📊</span><span class="feature-name">营养分析</span><span class="feature-desc">蛋白质脂肪碳水</span></div>
      <div class="feature"><span class="feature-icon">👤</span><span class="feature-name">私人计划</span><span class="feature-desc">根据体质定制</span></div>
    </div>

    <button class="install-btn" onclick="window.location.href='./app.html'">🚀 立即使用</button>
    <button class="install-btn-secondary" onclick="addToHome()">📱 添加到主屏幕</button>

    <div class="guide android-guide">
      <div class="guide-title">📱 Android 安装指南</div>
      <div class="guide-step"><span class="step-num">1</span><span>点击上方"立即使用"进入应用</span></div>
      <div class="guide-step"><span class="step-num">2</span><span>点击浏览器菜单(右上角⋮)</span></div>
      <div class="guide-step"><span class="step-num">3</span><span>选择"添加到主屏幕"即可</span></div>
    </div>

    <div class="guide ios-guide">
      <div class="guide-title">🍎 iPhone 安装指南</div>
      <div class="guide-step"><span class="step-num">1</span><span>点击上方"立即使用"进入应用</span></div>
      <div class="guide-step"><span class="step-num">2</span><span>点击Safari底部分享按钮 ⬆️</span></div>
      <div class="guide-step"><span class="step-num">3</span><span>向下滑动找到"添加到主屏幕"</span></div>
      <div class="guide-step"><span class="step-num">4</span><span>点击"添加"即可在桌面使用</span></div>
    </div>

    <p class="footer">无需下载安装包 · 无需应用商店 · 浏览器即用</p>
  </div>

  <script>
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent)
    if (isIOS) {
      document.querySelector('.ios-guide').style.display = 'block'
      document.querySelector('.android-guide').style.display = 'none'
    }

    var deferredPrompt = null
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault()
      deferredPrompt = e
    })

    function addToHome() {
      if (deferredPrompt) {
        deferredPrompt.prompt()
        deferredPrompt.userChoice.then(function() { deferredPrompt = null })
      } else if (isIOS) {
        alert('请点击Safari底部分享按钮 ⬆️\n然后选择"添加到主屏幕"')
      } else {
        alert('请点击浏览器菜单(右上角⋮)\n然后选择"添加到主屏幕"或"安装应用"')
      }
    }
  </script>
</body>
</html>
